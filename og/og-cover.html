<style>
  *,*::before,*::after{ box-sizing:border-box; }

  .cover{

  /* ── Left content column ── */

    letter-spacing:0.012em; color:#FFFFFF; font-size:96px; margin:0; }
  .tagline{ margin-top:26px; font-size:29px; line-height:1.34; font-weight:500;
    color:rgba(255,255,255,0.82); max-width:600px; }

  /* ── Right logo tile ── */
  .tile{ position:absolute; right:88px; top:50%; transform:translateY(-50%);
    width:300px; height:300px; border-radius:44px; background:#FFFFFF;
    border:2px solid rgba(255,255,255,0.22); overflow:hidden;
    display:flex; align-items:center; justify-content:center; }
  .tile img{ width:100%; height:100%; object-fit:contain; }
  .tile.pad img{ width:74%; height:74%; }

  /* ── Right accent panel (used when a project has no logo asset) ── */
  .panel{ position:absolute; right:0; top:0; width:360px; height:630px;
    background:#FA4F00; }

  /* ── Personal mark (bottom-left corner) ── */
  .mark{ position:absolute; left:88px; bottom:46px;
    display:flex; align-items:center; gap:12px; opacity:0.92; }
  .mark img{ width:40px; height:40px; }
  .mark span{ font-size:20px; font-weight:600; color:rgba(255,255,255,0.82); letter-spacing:0.01em; }
